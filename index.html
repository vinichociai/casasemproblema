<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Sem Problema</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="./assets/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <main class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <img src="./assets/logo.png" alt="Logo">
      </div>

      <h1>Casa Sem Problema</h1>
      <p>Soluções reais que funcionam!</p>

      <!-- REDES -->
      <div class="socials">
        <a href="https://instagram.com/casa.sem.problema" target="_blank">
          <img src="./assets/icons/instagram.png">
        </a>

        <a href="https://tiktok.com/@casa.sem.problema" target="_blank">
          <img src="./assets/icons/tiktok.png">
        </a>

        <!-- <a href="https://facebook.com/casa.sem.problema" target="_blank ">
          <img src="./assets/icons/facebook.png">
        </a> -->
      </div>
    </header>

    <div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Buscar produto..." />
</div>

    <!-- PRODUTOS -->
   <section class="products" id="productsContainer"></section>
    <p id="noResults" class="no-results">❌ Nenhum produto encontrado</p>

  </main>

  <script src="products.js"></script>
  <script src="script.js"></script>
</body>
</html>
